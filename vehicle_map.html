<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HANA — Vehicle Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f5f5f3;font-family:-apple-system,'Be Vietnam Pro',sans-serif;color:#1a1a1a;overflow:hidden}
.app{display:grid;grid-template-columns:320px 1fr;height:100vh}

/* Sidebar */
.sidebar{background:#faf9f7;border-right:0.5px solid #ebe8e2;display:flex;flex-direction:column;overflow:hidden}
.hdr{padding:14px 16px 12px;border-bottom:0.5px solid #ebe8e2;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.brand-mark{width:32px;height:32px;background:#3a3a3a;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;font-family:monospace;letter-spacing:-1px}
.brand-name{font-size:13px;font-weight:500;color:#2a2a2a}
.brand-sub{font-size:10px;color:#aaa;font-family:monospace;margin-top:1px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.stat{background:#fff;border:0.5px solid #ebe8e2;border-radius:8px;padding:8px 10px;text-align:center}
.sv{font-size:20px;font-weight:500;line-height:1;color:#2a2a2a}
.sl{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.7px;margin-top:3px}

/* Status bar */
.statusbar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-bottom:0.5px solid #ebe8e2;font-size:10px;color:#aaa;font-family:monospace;flex-shrink:0;background:#faf9f7}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#22c55e;margin-right:5px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-btn{background:none;border:0.5px solid #d0cdc6;border-radius:4px;padding:2px 8px;font-size:9px;font-family:monospace;color:#666;cursor:pointer;transition:all .15s}
.refresh-btn:hover{border-color:#1a1a1a;color:#1a1a1a}

/* Vehicle list */
.vlist{flex:1;overflow-y:auto;padding:8px}
.vlist::-webkit-scrollbar{width:3px}
.vlist::-webkit-scrollbar-thumb{background:#e5e2db;border-radius:2px}

.vcard{background:#fff;border:0.5px solid #ebe8e2;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .15s;overflow:hidden;position:relative}
.vcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.vcard.moving::before{background:#3b82f6;animation:pulse-line 1.5s infinite}
.vcard.has-order::before{background:#22c55e}
.vcard.warn::before{background:#f59e0b}
.vcard.idle::before{background:#e5e2db}
@keyframes pulse-line{0%,100%{opacity:1}50%{opacity:.3}}
.vcard:hover{border-color:#d5d1ca;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.vcard.sel{border-color:#aaa;box-shadow:0 2px 10px rgba(0,0,0,.08)}

.vh{display:flex;align-items:center;gap:7px;padding:9px 12px 5px}
.plate{font-family:monospace;font-size:11px;font-weight:700;background:#f5f3f0;color:#2a2a2a;padding:2px 7px;border-radius:4px;border:0.5px solid #e5e2db}
.driver{font-size:11px;color:#666;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spd{font-size:9px;font-family:monospace;padding:2px 7px;border-radius:99px}
.spd.go{background:#dbeafe;color:#1d4ed8;border:0.5px solid #bfdbfe}
.spd.stop{background:#f5f3f0;color:#9ca3af;border:0.5px solid #ebe8e2}
.spd.warn{background:#fef3c7;color:#92400e;border:0.5px solid #fde68a}

.vaddr{padding:0 12px 8px;font-size:10px;color:#999;line-height:1.4}
.vinfo{display:flex;gap:8px;padding:0 12px 7px;font-size:9px;color:#bbb;font-family:monospace}

.vorder{padding:7px 12px 9px;border-top:0.5px solid #f5f3f0;background:#fdfcfb}
.osid{font-family:monospace;font-size:10px;font-weight:700;color:#1d4ed8}
.otype{display:inline-block;font-size:8px;font-family:monospace;padding:1px 5px;border-radius:3px;margin-left:5px;font-weight:700;text-transform:uppercase}
.exp{background:#dcfce7;color:#166534;border:0.5px solid #bbf7d0}
.imp{background:#ede9fe;color:#5b21b6;border:0.5px solid #ddd6fe}
.oroute{font-size:10px;color:#777;margin-top:3px;line-height:1.4}
.ometa{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.mt{font-size:8px;padding:2px 6px;border-radius:4px;border:0.5px solid #ebe8e2;color:#888;font-family:monospace;background:#faf9f7}
.mr{background:#fef2f2;border-color:#fecaca;color:#b91c1c}
.my{background:#fffbeb;border-color:#fde68a;color:#92400e}
.norder{font-size:10px;color:#ccc;font-style:italic}

/* Unassigned */
.bot{border-top:0.5px solid #ebe8e2;padding:9px 16px 10px;flex-shrink:0;background:#faf9f7}
.bot-title{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#bbb;font-family:monospace;margin-bottom:6px}
.ulist{display:flex;flex-direction:column;gap:3px;max-height:88px;overflow-y:auto}
.uitem{font-size:10px;color:#999;line-height:1.5;display:flex;gap:5px;align-items:center}
.usid{font-family:monospace;font-size:9px;font-weight:700;color:#5b8bd4}

/* Map area */
.mapwrap{position:relative}
#map{width:100%;height:100vh}
.leaflet-container{background:#e8e4dc}

/* Map overlays */
.topbar{position:absolute;top:0;left:0;right:0;padding:10px 14px;background:linear-gradient(to bottom,rgba(255,255,255,.95) 0%,rgba(255,255,255,0) 100%);z-index:999;pointer-events:none;display:flex;align-items:center;gap:10px}
.tbt{font-size:10px;font-family:monospace;color:#888}
.tbc{font-size:11px;font-family:monospace;color:#1a1a1a;margin-left:auto;font-weight:500}

.fsb{position:absolute;top:10px;right:10px;z-index:1000;background:#fff;border:0.5px solid #ddd;color:#666;font-size:10px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:monospace;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .15s}
.fsb:hover{border-color:#1a1a1a;color:#1a1a1a}

/* Popup */
.leaflet-popup-content-wrapper{background:#fff!important;border:0.5px solid #ddd!important;border-radius:10px!important;box-shadow:0 4px 20px rgba(0,0,0,.12)!important;color:#1a1a1a!important;font-family:-apple-system,'Be Vietnam Pro',sans-serif!important;padding:0!important}
.leaflet-popup-content{margin:0!important;width:260px!important}
.leaflet-popup-tip{background:#fff!important}
.pi{padding:13px}
.pp{font-family:monospace;font-size:13px;font-weight:700;color:#1a1a1a}
.pd{font-size:10px;color:#888;margin-top:2px}
.pa{font-size:10px;color:#444;margin-top:7px;line-height:1.5}
.prow{display:flex;gap:10px;margin-top:5px;font-size:10px;color:#888}
.pdv{border:none;border-top:0.5px solid #f0ede8;margin:9px 0}
.porder{font-family:monospace;font-size:10px;font-weight:700;color:#1d4ed8}
.proute{font-size:10px;color:#666;margin-top:3px;line-height:1.5}
.pcl{font-size:9px;margin-top:5px}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="hdr">
      <div class="brand">
        <div class="brand-mark">HL</div>
        <div>
          <div class="brand-name">HANA Logistics</div>
          <div class="brand-sub">// Vehicle Tracking</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="sv" id="s-total">6</div><div class="sl">Online</div></div>
        <div class="stat"><div class="sv" id="s-moving" style="color:#3b82f6">2</div><div class="sl">Đang chạy</div></div>
        <div class="stat"><div class="sv" id="s-order" style="color:#22c55e">2</div><div class="sl">Có đơn</div></div>
      </div>
    </div>
    <div class="statusbar">
      <span><span class="live-dot"></span><span id="upd">05/04 15:43 ICT · pageIds=6154</span></span>
      <button class="refresh-btn" onclick="loadGPS()">↻ Refresh</button>
    </div>
    <div class="vlist" id="vlist"></div>
    <div class="bot">
      <div class="bot-title">Đơn chưa gán xe</div>
      <div class="ulist" id="ulist"></div>
    </div>
  </div>

  <!-- Map -->
  <div class="mapwrap">
    <div class="topbar">
      <span class="tbt">GPS Realtime · HANA Fleet · 6 xe</span>
      <span class="tbc" id="clk"></span>
    </div>
    <button class="fsb" onclick="document.body.requestFullscreen?.()">⛶ Fullscreen</button>
    <div id="map"></div>
  </div>
</div>

<script>
const GPS_STATIC = [
  {Plate:"50E13970",DriverName:"Nguyễn Văn Hải",Lat:10.7628279,Lng:106.773,Speed:0,Fuel:333,IsStop:true,BeginStop:"2026-04-04T20:03:17",Address:"KCN Cát Lái 2, P. Cát Lái, TP. Thủ Đức",TripKm:6.6,Key:false},
  {Plate:"50H75513",DriverName:"Nguyễn Thành Dân",Lat:10.35009,Lng:106.408989,Speed:0,Fuel:588,IsStop:true,BeginStop:"2026-04-04T20:40:34",Address:"QL50, Chợ Gạo, Mỹ Phong, Đồng Tháp",TripKm:0.1,Key:false},
  {Plate:"50E39407",DriverName:"Nguyễn Văn Thăng",Lat:10.7627516,Lng:106.773056,Speed:0,Fuel:398,IsStop:true,BeginStop:"2026-04-04T23:51:47",Address:"KCN Cát Lái 2, P. Cát Lái, TP. Thủ Đức",TripKm:0,Key:false},
  {Plate:"50E32294",DriverName:"Võ Khắc Nguyên",Lat:10.4433937,Lng:106.342476,Speed:52,Fuel:334,IsStop:false,BeginStop:"2000-01-01T00:00:00",Address:"QL1, Tân Hiệp, Châu Thành, Đồng Tháp",TripKm:21,Key:true},
  {Plate:"50H91408",DriverName:"Lê Minh Định",Lat:10.0986481,Lng:106.516205,Speed:6,Fuel:362,IsStop:false,BeginStop:"2000-01-01T00:00:00",Address:"Trương Vĩnh Trọng, Hưng Nhượng, Vĩnh Long",TripKm:0.2,Key:true},
  {Plate:"50H60625",DriverName:"Trần Ngọc Thảo",Lat:10.0991888,Lng:106.515137,Speed:0,Fuel:468,IsStop:true,BeginStop:"2026-04-05T06:27:14",Address:"Trương Vĩnh Trọng, Hưng Nhượng, Vĩnh Long",TripKm:0,Key:true},
];

const TRF = [
  {sid:"TRF266864",plate:"50E32294",type:"Export",cont:"FBIU5164556",ct:"40RH",cust:"GREENBUD",vsl:"MILD SYMPHONY 2613N",wh:"Hoàng Phát, Tầm Vu, Long An + Mầm Xanh, Bến Tre",ret:"CAT LAI TMNL",cl:"2026-04-07T01:00:00+07:00"},
  {sid:"TRF266856",plate:"50H91408",type:"Export",cont:"ONEU9400128",ct:"40RH",cust:"GREENBUD",vsl:"SEASPAN OSAKA 0033E",wh:"Mầm Xanh, Hưng Nhượng, Bến Tre + Hoàng Phát",ret:"Cat Lai Giang Nam",cl:"2026-04-05T13:00:00+07:00"},
  {sid:"TRF266858",plate:null,ct:"20RF",cust:"GREENBUD",cl:"2026-04-05T13:00:00+07:00"},
  {sid:"TRFA266801",plate:"71H01294",ct:"40RH",cust:"PHUCUONGEXIM",cl:"2026-04-06T22:00:00+07:00"},
  {sid:"TRF266853",plate:null,ct:"40HC",cust:"TAMNGOC",cl:"2026-04-07T08:00:00+07:00"},
  {sid:"TRF266863",plate:null,ct:"40RH",cust:"GREENBUD",cl:"2026-04-07T01:00:00+07:00"},
  {sid:"TRFA266866",plate:null,ct:"20RF",cust:"SEAPRO",cl:"2026-04-06T17:00:00+07:00"},
  {sid:"TRFA266867",plate:null,ct:"40RH",cust:"WELLONG",cl:"2026-04-08T21:30:00+07:00"},
  {sid:"TRF266865",plate:null,ct:"20RF",cust:"GREENBUD",cl:"2026-04-08T03:00:00+07:00"},
  {sid:"TRF266860",plate:null,ct:"40HC",cust:"TAMNGOC",cl:"2026-04-08T23:00:00+07:00"},
];

const trfMap = {};
TRF.forEach(t=>{if(t.plate)trfMap[t.plate.replace(/\s/g,'').toUpperCase()]=t});

function stopMin(v){if(!v.IsStop||v.BeginStop.startsWith('2000'))return 0;return Math.round((Date.now()-new Date(v.BeginStop+'Z'))/60000)}
function fmt(m){return m<60?m+'p':Math.floor(m/60)+'g'+(m%60<10?'0':'')+(m%60)+'p'}
function fmtFuel(f){return Math.round(f/10)+'L'}
function fmtClose(iso){
  const d=new Date(iso),diff=d-Date.now(),h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
  if(diff<0)return`<span class="mt mr">Đã qua ${Math.abs(h)}h</span>`;
  if(h<6)return`<span class="mt mr">Closing còn ${h}g${Math.abs(m)}p</span>`;
  if(h<12)return`<span class="mt my">Closing còn ${h}g${m}p</span>`;
  return`<span class="mt">CUT ${d.toLocaleDateString('vi-VN')} ${d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})}</span>`;
}

// Map init — light tile
const map = L.map('map',{center:[10.55,106.60],zoom:8,zoomControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© CartoDB',maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

// Clock
setInterval(()=>{
  const n=new Date();
  document.getElementById('clk').textContent=n.toLocaleTimeString('vi-VN',{hour12:false})+' ICT';
},1000);

function makeIcon(color, moving, hasOrder){
  const pulse = moving ? `<circle cx="14" cy="10" r="11" fill="${color}" opacity="0.15"><animate attributeName="r" values="11;17;11" dur="1.8s" repeatCount="indefinite"/></circle>` : '';
  const shadow = `filter="drop-shadow(0 1px 3px rgba(0,0,0,0.25))"`;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    ${pulse}
    <path d="M14 1C9 1 5 5 5 10c0 7 9 17 9 17s9-10 9-17C23 5 19 1 14 1z" fill="${color}" ${shadow}/>
    <circle cx="14" cy="10" r="5.5" fill="white"/>
    <text x="14" y="14" text-anchor="middle" font-size="7" font-family="monospace" font-weight="bold" fill="${color}">${moving?'▶':'●'}</text>
  </svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[28,36],iconAnchor:[14,36],popupAnchor:[0,-36]});
}

const markers = {};

function renderVehicles(vehicles){
  const vlist = document.getElementById('vlist');
  vlist.innerHTML='';
  Object.values(markers).forEach(m=>map.removeLayer(m));

  let moving=0,withOrder=0;

  vehicles.forEach(v=>{
    const pk = v.Plate.replace(/\s/g,'').toUpperCase();
    const trf = trfMap[pk];
    const isMoving = (v.Speed||0) > 2;
    const sm = stopMin(v);
    const isWarn = !isMoving && sm > 180;
    if(isMoving) moving++;
    if(trf) withOrder++;

    // Marker color
    const color = isMoving ? '#3b82f6' : trf ? '#22c55e' : isWarn ? '#f59e0b' : '#9ca3af';
    const icon = makeIcon(color, isMoving, !!trf);

    // Popup
    const orderHtml = trf ? `
      <hr class="pdv">
      <div class="porder">${trf.sid} <span class="otype ${trf.type==='Export'?'exp':'imp'}">${trf.type||'Export'}</span></div>
      <div class="proute">📦 ${trf.ct}${trf.cont?' · '+trf.cont:''}<br>🏠 ${(trf.wh||'').substring(0,45)}<br>🚢 ${trf.vsl||''}</div>
      <div class="pcl">${fmtClose(trf.cl)}</div>`
      : `<hr class="pdv"><span style="font-size:10px;color:#bbb;font-style:italic">Không có đơn active</span>`;

    const popup = `<div class="pi">
      <div class="pp">${v.Plate}</div>
      <div class="pd">👤 ${v.DriverName}${v.Key?' · 🔑 Nổ máy':''}</div>
      <div class="pa">📍 ${v.Address}</div>
      <div class="prow">
        ${isMoving?`<span style="color:#3b82f6;font-weight:500">▶ ${v.Speed} km/h</span>`:`<span>⏸ Dừng ${fmt(sm)}</span>`}
        <span>⛽ ${fmtFuel(v.Fuel)}</span>
        <span>📏 ${v.TripKm} km</span>
      </div>
      ${orderHtml}
    </div>`;

    const m = L.marker([v.Lat,v.Lng],{icon}).addTo(map).bindPopup(popup,{maxWidth:270});
    markers[v.Plate]=m;

    // Card
    const cls = isMoving?'moving':trf?'has-order':isWarn?'warn':'idle';
    const card = document.createElement('div');
    card.className=`vcard ${cls}`;
    card.innerHTML=`
      <div class="vh">
        <div class="plate">${v.Plate}</div>
        <div class="driver">${v.DriverName}</div>
        <div class="spd ${isMoving?'go':isWarn?'warn':'stop'}">${isMoving?`▶ ${v.Speed}km/h`:`⏸ ${fmt(sm)}`}</div>
      </div>
      <div class="vaddr">${v.Address.substring(0,55)}</div>
      <div class="vinfo"><span>⛽ ${fmtFuel(v.Fuel)}</span><span>📏 ${v.TripKm} km hôm nay</span>${v.Key?'<span>🔑 Nổ máy</span>':''}</div>
      ${trf?`<div class="vorder">
        <span class="osid">${trf.sid}</span><span class="otype ${trf.type==='Export'?'exp':'imp'}">${trf.type||'Export'}</span>
        <div class="oroute">${(trf.wh||'').split('\n')[0].substring(0,42)}</div>
        <div class="ometa"><span class="mt">${trf.cust}</span><span class="mt">${trf.ct}</span>${fmtClose(trf.cl)}</div>
      </div>`:`<div class="vorder"><div class="norder">Không có đơn active</div></div>`}
    `;
    card.onclick=()=>{
      document.querySelectorAll('.vcard').forEach(c=>c.classList.remove('sel'));
      card.classList.add('sel');
      map.setView([v.Lat,v.Lng],13,{animate:true});
      markers[v.Plate]?.openPopup();
    };
    vlist.appendChild(card);
  });

  document.getElementById('s-total').textContent=vehicles.length;
  document.getElementById('s-moving').textContent=moving;
  document.getElementById('s-order').textContent=withOrder;

  // Fit
  const pts=vehicles.filter(v=>v.Lat&&v.Lng).map(v=>[v.Lat,v.Lng]);
  if(pts.length>0) map.fitBounds(pts,{padding:[40,40],maxZoom:11});
}

function renderUnassigned(){
  const ul=document.getElementById('ulist');
  ul.innerHTML='';
  TRF.filter(t=>!t.plate).forEach(t=>{
    const h=Math.round((new Date(t.cl)-Date.now())/3600000);
    const d=document.createElement('div');
    d.className='uitem';
    const clr=h<0?'#b91c1c':h<12?'#92400e':h<24?'#854d0e':'#9ca3af';
    d.innerHTML=`<span class="usid">${t.sid}</span><span>${t.cust}</span><span>${t.ct}</span><span style="color:${clr};font-family:monospace;font-size:9px;margin-left:auto">${h<0?'Đã qua':'còn ~'+h+'h'}</span>`;
    ul.appendChild(d);
  });
}

function loadGPS(){
  document.getElementById('upd').textContent='Đang tải...';
  fetch('https://adsun-proxy.giangkoi89.workers.dev/gps?pageIds=6154')
    .then(r=>r.json())
    .then(data=>{
      const vehicles=data.Data||[];
      const now=new Date();
      document.getElementById('upd').textContent=`${now.toLocaleDateString('vi-VN')} ${now.toLocaleTimeString('vi-VN',{hour12:false})} ICT · ${vehicles.length} xe`;
      if(vehicles.length>0) renderVehicles(vehicles);
    })
    .catch(()=>{
      document.getElementById('upd').textContent='GPS offline · hiển thị data tĩnh';
      renderVehicles(GPS_STATIC);
    });
}

// Init
renderVehicles(GPS_STATIC);
renderUnassigned();
loadGPS();
setInterval(loadGPS, 60000);
</script>
</body>
</html>
